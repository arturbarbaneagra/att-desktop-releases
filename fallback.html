<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>A Trader's Tool — offline</title>
<style>
  html, body {
    height: 100%; margin: 0;
    background: #0d1117; color: #c9d1d9;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .box { text-align: center; max-width: 420px; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 8px; color: #e6edf3; }
  p { font-size: 14px; line-height: 1.5; color: #8b949e; margin: 0 0 20px; }
  button {
    background: #238636; color: #fff; border: 0; border-radius: 6px;
    padding: 10px 28px; font-size: 15px; cursor: pointer;
  }
  button:hover { background: #2ea043; }
  button.secondary { background: #30363d; margin-left: 8px; }
  button.secondary:hover { background: #3d444d; }
  .dot { font-size: 40px; margin-bottom: 12px; }
  .proxy-note {
    display: none; margin: 0 0 18px; padding: 10px 12px;
    background: #21262d; border: 1px solid #30363d; border-radius: 8px;
    font-size: 13px; line-height: 1.5; color: #adbac7;
  }
  .proxy-note code { color: #e6edf3; }
</style>
</head>
<body>
  <div class="box">
    <div class="dot">📡</div>
    <h1>Can't reach atraderstool.com</h1>
    <p>Check your internet connection, then try again. The app will load as soon as the server is reachable.</p>
    <div class="proxy-note" id="proxy-note">
      A network proxy is enabled (<code id="proxy-desc"></code>). If it's wrong or offline it can block all traffic — disable it to get back online.
    </div>
    <button id="retry">Retry</button>
    <button id="disable-proxy" class="secondary" style="display:none">Disable proxy &amp; retry</button>
  </div>
  <script>
    // The intended app URL (e.g. a ?feature=<id> URL) is passed by main.js via the
    // `retry` query param so we return to the same page the window was on, not the
    // root panel. Fall back to the site root if it's missing or off-origin.
    var ROOT = 'https://atraderstool.com';
    var params = new URLSearchParams(location.search);
    function retryUrl() {
      try {
        var r = params.get('retry');
        if (r && new URL(r).hostname.replace(/^www\./, '').endsWith('atraderstool.com')) return r;
      } catch (e) {}
      return ROOT;
    }
    var TARGET = retryUrl();
    document.getElementById('retry').onclick = function () { location.replace(TARGET); };

    // If a proxy is active, main.js passes ?proxy=<scheme://host:port>. Show the
    // notice + a "Disable proxy & retry" button wired to the preload bridge — the
    // guaranteed recovery path when a bad proxy blacks out all network traffic.
    var proxyDesc = params.get('proxy');
    if (proxyDesc && window.attProxy && typeof window.attProxy.clear === 'function') {
      var note = document.getElementById('proxy-note');
      var descEl = document.getElementById('proxy-desc');
      var btn = document.getElementById('disable-proxy');
      if (descEl) descEl.textContent = proxyDesc;
      if (note) note.style.display = 'block';
      if (btn) {
        btn.style.display = 'inline-block';
        btn.onclick = function () {
          btn.disabled = true;
          // clear() itself reloads this window through the main process; navigate
          // as a belt-and-suspenders fallback in case the reload is delayed.
          window.attProxy.clear().then(function () {
            location.replace(TARGET);
          }).catch(function () { btn.disabled = false; });
        };
      }
    }

    // Auto-retry every 15s
    setInterval(function () {
      fetch(ROOT + '/health', { mode: 'no-cors' })
        .then(function () { location.replace(TARGET); })
        .catch(function () {});
    }, 15000);
  </script>
</body>
</html>
