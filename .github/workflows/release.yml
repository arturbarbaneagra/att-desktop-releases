name: Release (Windows)

# Builds the Windows installer + portable exe on a REAL windows-latest runner
# with the standard electron-builder toolchain (real NSIS — no sandbox
# uninstaller-reader patch), smoke-tests the install / in-place update /
# uninstall cycle, and only then publishes the release assets.
#
# This repo IS the public releases feed that the app's updater points at, so the
# built-in GITHUB_TOKEN can publish straight to this repo's own Releases — no
# Personal Access Token or extra secret is needed.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built assets to this repo's Releases"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # npm 10.x (bundled with older Node) intermittently crashes on the Windows
      # runner with "Exit handler never called!" — it exits 0 but installs
      # nothing, leaving node_modules empty (so electron-builder can't find
      # Electron). npm 11 fixes this. Node 22 also clears the EBADENGINE warnings
      # from node-abi / @electron/rebuild (they require Node >= 22.12).
      - name: Upgrade npm to 11 (fixes "Exit handler never called!")
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build installer + portable (real NSIS, no publish)
        run: npx electron-builder --win nsis portable --publish never

      - name: Smoke test install / in-place update / uninstall
        run: node scripts/ci-smoke-test.js

      - name: Upload build artifacts (debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

      # Publish only on a real tag push (v1.1.9 …) or a manual run with
      # publish=true. The four files electron-updater needs (setup.exe, its
      # .blockmap, latest.yml, portable.exe) go to THIS repo's Releases via the
      # built-in GITHUB_TOKEN — the exact bytes the smoke test just validated.
      - name: Publish assets to this repo's Releases
        if: startsWith(github.ref, 'refs/tags/') || inputs.publish
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
          fail_on_unmatched_files: true
          files: |
            dist/*-setup.exe
            dist/*-setup.exe.blockmap
            dist/latest.yml
            dist/*-portable.exe
